version: '3.8'

services:
  backend:
    build: .
    container_name: leafai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  frontend:
    build: .
    container_name: leafai_frontend
    ports:
      - "8506:8506"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["streamlit", "run", "src/ui/streamlit_app.py", "--server.port=8506", "--server.address=0.0.0.0"]
    restart: unless-stopped
    depends_on:
      - backend
